<!DOCTYPE html>
<html lang="pt-br" style="--font: 'Poppins', sans-serif;">
<head>
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIEL</title>

<link rel="stylesheet" href="https://alianca-zx.com.br/css/linktree.css">

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* REMOVE LINHAS */
.sep, .sep::before, .sep::after, h3::after {
  display: none !important;
}
a { text-decoration: none !important; }

.header-overlay {
  background: transparent;
}

/* CARDS */
.card {
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(30px);
  animation: aparecer 0.6s ease forwards;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== EFEITO DE CHUVA MAIS REALISTA ===== */
#chuva {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

.gota {
  position: absolute;
  width: 1px;
  height: 25px;
  background: linear-gradient(to bottom, rgba(200, 220, 255, 0), rgba(200, 220, 255, 0.6));
  top: -30px;
  animation: cair linear infinite;
  filter: blur(0.5px);
}

@keyframes cair {
  0% {
    top: -30px;
    opacity: 0;
    transform: translateX(0);
  }
  10% {
    opacity: 1;
  }
  100% {
    top: 100vh;
    opacity: 0.3;
    transform: translateX(-5px);
  }
}

/* ===== EFEITO DE TROVÃO CINEMATOGRÁFICO ===== */
#trovao {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(180, 200, 255, 0.6) 40%, rgba(0,0,0,0) 100%);
  opacity: 0;
  pointer-events: none;
  z-index: 9998;
  transition: opacity 0.1s ease;
}

#trovao.ativo {
  opacity: 0.25;
}

/* ===== BOTÕES DE MÚSICA ESTILO LUXO ===== */
.controles-musica {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 15px auto 25px;
  width: fit-content;
}

.btn-musica {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: 2px solid rgba(255, 204, 0, 0.5);
  background: radial-gradient(circle at 30% 30%, rgba(255, 204, 0, 0.25), rgba(0,0,0,0));
  color: #ffdd44;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: 
    0 0 15px rgba(255, 204, 0, 0.4),
    inset 0 0 15px rgba(255, 204, 0, 0.2);
  text-shadow: 0 0 10px rgba(255, 204, 0, 0.8);
}

.btn-musica:hover {
  transform: scale(1.1);
  border-color: #ffcc00;
  box-shadow: 
    0 0 25px rgba(255, 204, 0, 0.7),
    inset 0 0 20px rgba(255, 204, 0, 0.3);
}

.btn-musica.ativo {
  background: #ffcc00;
  color: #1a1a1a;
  text-shadow: none;
  box-shadow: 
    0 0 30px rgba(255, 204, 0, 1),
    inset 0 0 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- CAMADA DE CHUVA -->
<div id="chuva"></div>

<!-- CAMADA DE TROVÃO -->
<div id="trovao"></div>

<header class="header">
  <div class="header-bg" style="background-image: url('https://i.imgur.com/VaPTmDN.jpeg');"></div>

  <div class="header-overlay">
    <h1>ALIANÇA CIEL</h1>

    <div class="socials">
      <a href="https://wa.me/5581989102528" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" width="22">
      </a>
    </div>
  </div>

  <div class="curve"></div>
</header>

<div class="descricao-topo">
  Comunidade focada em Divulgação e Entretenimento 🏆
</div>

<!-- BOTÕES DE CONTROLE -->
<div class="controles-musica">
  <button class="btn-musica" id="btnPlay" title="Play / Pause">
    ▶
  </button>
  <button class="btn-musica" id="btnMute" title="Ativar / Desativar Som">
    🔊
  </button>
</div>

<main>

<div class="categoria">Oficial CIEL</div>

<div class="scroll">

  <a href="https://whatsapp.com/channel/0029VbCSJAR47XeHuhDMMh2g" target="_blank" class="card-link">
    <div class="card oficial">
      <img src="https://i.imgur.com/Benm8eP.jpeg">
      <h3>ALIANÇA CIEL</h3>
      <p>Fique por dentro de tudo na CIEL através do canal!</p>
    </div>
  </a>

  <a href="https://chat.whatsapp.com/JSbeogWBjWwDC4sJohrBgB?mode=gi_t" target="_blank" class="card-link">
    <div class="card">
      <img src="https://i.imgur.com/QOS7lYu.jpeg">
      <h3>ALIANÇA CIEL</h3>
      <p>Entre no grupo oficial da Aliança CIEL e participe da comunidade!</p>
    </div>
  </a>

</div>

</main>

<!-- 🎵 MÚSICA -->
<audio id="musica" loop>
  <source src="https://raw.githubusercontent.com/alianca-ciel/Alian-a-Ciel/main/elpis.mp3" type="audio/mpeg">


<script>
const musica = document.getElementById("musica");
const btnPlay = document.getElementById("btnPlay");
const btnMute = document.getElementById("btnMute");
const trovao = document.getElementById("trovao");

let tocando = false;
let mutado = false;

// Função para iniciar música
function iniciarMusica() {
  if (!tocando) {
    musica.play().then(() => {
      tocando = true;
      btnPlay.innerHTML = "⏸";
      btnPlay.classList.add("ativo");
    }).catch(() => {});
  }
}

document.addEventListener("click", iniciarMusica, { once: true });

// Controles
btnPlay.addEventListener("click", () => {
  if (tocando) {
    musica.pause();
    btnPlay.innerHTML = "▶";
    btnPlay.classList.remove("ativo");
  } else {
    musica.play();
    btnPlay.innerHTML = "⏸";
    btnPlay.classList.add("ativo");
  }
  tocando = !tocando;
});

btnMute.addEventListener("click", () => {
  musica.muted = !musica.muted;
  mutado = musica.muted;
  
  if(mutado) {
    btnMute.innerHTML = "🔇";
    btnMute.classList.remove("ativo");
  } else {
    btnMute.innerHTML = "🔊";
    btnMute.classList.add("ativo");
  }
});

// Efeito Chuva
const chuvaEl = document.getElementById('chuva');
const quantidadeGotas = 50; // Um pouco mais de gotas para ficar melhor

for (let i = 0; i < quantidadeGotas; i++) {
  criarGota();
}

function criarGota() {
  const gota = document.createElement('div');
  gota.classList.add('gota');
  
  const left = Math.random() * 100;
  const duracao = 2.5 + Math.random() * 3; // Velocidade variada
  const atraso = Math.random() * 5;
  const tamanho = 1 + Math.random() * 1;

  gota.style.left = left + 'vw';
  gota.style.animationDuration = duracao + 's';
  gota.style.animationDelay = atraso + 's';
  gota.style.width = tamanho + 'px';

  chuvaEl.appendChild(gota);
}

// Efeito Trovão Realista
function fazerTrovao() {
  // Primeiro clarão forte
  trovao.classList.add('ativo');
  setTimeout(() => {
    trovao.classList.remove('ativo');
    // As vezes pisca de novo rápido para parecer real
    if(Math.random() > 0.5) {
      setTimeout(() => {
        trovao.classList.add('ativo');
        setTimeout(() => trovao.classList.remove('ativo'), 100);
      }, 150);
    }
  }, 180);
  
  // Próximo trovão entre 7 e 14 segundos
  const proximo = 7000 + Math.random() * 7000;
  setTimeout(fazerTrovao, proximo);
}

// Começa depois de 4 segundos
setTimeout(fazerTrovao, 4000);
</script>

</body>
</html>
