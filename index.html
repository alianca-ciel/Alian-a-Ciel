<!DOCTYPE html>
<html lang="pt-br" style="--font: 'Poppins', sans-serif;">
<head>
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIEL</title>

<link rel="stylesheet" href="https://alianca-zx.com.br/css/linktree.css">

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* REMOVE LINHAS */
.sep, .sep::before, .sep::after, h3::after {
  display: none !important;
}
a { text-decoration: none !important; }

.header-overlay {
  background: transparent;
}

/* ===== CARDS ===== */
.card {
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.3),
    inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  animation: aparecer 0.6s ease forwards;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-10px) scale(1);
  box-shadow: 
    0 15px 40px rgba(0, 0, 0, 0.4),
    0 0 25px rgba(255, 204, 0, 0.15);
  border-color: rgba(255, 204, 0, 0.3);
}

.card img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.05);
}

.card h3 {
  font-size: 18px;
  margin: 15px 15px 5px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
}

.card p {
  font-size: 14px;
  margin: 0 15px 20px;
  color: rgba(255, 255, 255, 0.7);
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ===== EFEITO DE CHUVA ===== */
#chuva {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

.gota {
  position: absolute;
  width: 1px;
  height: 25px;
  background: linear-gradient(to bottom, rgba(200, 220, 255, 0), rgba(200, 220, 255, 0.6));
  top: -30px;
  animation: cair linear infinite;
  filter: blur(0.5px);
}

@keyframes cair {
  0% {
    top: -30px;
    opacity: 0;
    transform: translateX(0);
  }
  10% {
    opacity: 1;
  }
  100% {
    top: 100vh;
    opacity: 0.3;
    transform: translateX(-5px);
  }
}

/* ===== EFEITO DE TROVÃO ===== */
#trovao {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(180, 200, 255, 0.6) 40%, rgba(0,0,0,0) 100%);
  opacity: 0;
  pointer-events: none;
  z-index: 9998;
  transition: opacity 0.1s ease;
}

#trovao.ativo {
  opacity: 0.25;
}

/* ===== BOTÕES DE MÚSICA ESTILO ULTRA MODERNO ===== */
.controles-musica {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
  margin: 25px auto;
  padding: 12px 25px;
  background: rgba(0, 0, 0, 0.25);
  border-radius: 60px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.3),
    inset 0 0 0 1px rgba(255, 255, 255, 0.05);
}

.btn-musica {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;
  background: radial-gradient(circle at 30% 30%, rgba(255, 204, 0, 0.3), rgba(15, 23, 42, 0.9));
  color: #ffdd44;
  font-size: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 
    0 6px 15px rgba(0, 0, 0, 0.4),
    inset 0 0 15px rgba(255, 204, 0, 0.2),
    0 0 0 1px rgba(255, 204, 0, 0.3);
  text-shadow: 0 0 10px rgba(255, 204, 0, 0.8);
  position: relative;
  overflow: hidden;
}

/* Efeito de brilho passando */
.btn-musica::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
  transition: left 0.5s ease;
}

.btn-musica:hover::before {
  left: 100%;
}

.btn-musica:hover {
  transform: scale(1.1);
  box-shadow: 
    0 0 30px rgba(255, 204, 0, 0.7),
    inset 0 0 20px rgba(255, 204, 0, 0.3),
    0 0 0 2px rgba(255, 204, 0, 0.6);
}

.btn-musica.ativo {
  background: radial-gradient(circle at 30% 30%, #ffdd44, #cc9900);
  color: #121212;
  text-shadow: none;
  box-shadow: 
    0 0 40px rgba(255, 204, 0, 1),
    inset 0 0 20px rgba(0, 0, 0, 0.3);
}

/* Botão Play/Pause maior e com destaque */
.btn-musica.play {
  width: 72px;
  height: 72px;
  font-size: 34px;
}
</style>
</head>

<body>

<!-- CAMADA DE CHUVA -->
<div id="chuva"></div>

<!-- CAMADA DE TROVÃO -->
<div id="trovao"></div>

<header class="header">
  <div class="header-bg" style="background-image: url('https://i.imgur.com/VaPTmDN.jpeg');"></div>

  <div class="header-overlay">
    <h1>ALIANÇA CIEL</h1>

    <div class="socials">
      <a href="https://wa.me/5581989102528" target="_blank">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" width="22">
      </a>
    </div>
  </div>

  <div class="curve"></div>
</header>

<div class="descricao-topo">
  Comunidade focada em Divulgação e Entretenimento 🏆
</div>

<!-- BOTÕES DE CONTROLE -->
<div class="controles-musica">
  <button class="btn-musica" id="btnPrev" title="Anterior">
    &#9664;&#9664;
  </button>
  
  <button class="btn-musica play" id="btnPlay" title="Play / Pause">
    &#9654;
  </button>
  
  <button class="btn-musica" id="btnNext" title="Próxima">
    &#9654;&#9654;
  </button>
</div>

<main>

<div class="categoria">Oficial CIEL</div>

<div class="scroll">

  <a href="https://whatsapp.com/channel/0029VbCSJAR47XeHuhDMMh2g" target="_blank" class="card-link">
    <div class="card oficial">
      <img src="https://i.imgur.com/Benm8eP.jpeg" alt="Canal CIEL">
      <h3>ALIANÇA CIEL</h3>
      <p>Fique por dentro de tudo na CIEL através do canal!</p>
    </div>
  </a>

  <a href="https://chat.whatsapp.com/JSbeogWBjWwDC4sJohrBgB?mode=gi_t" target="_blank" class="card-link">
    <div class="card">
      <img src="https://i.imgur.com/QOS7lYu.jpeg" alt="Grupo CIEL">
      <h3>ALIANÇA CIEL</h3>
      <p>Entre no grupo oficial da Aliança CIEL e participe da comunidade!</p>
    </div>
  </a>

</div>

</main>

<!-- 🎵 MÚSICA -->
<audio id="musica" loop>
  <source src="https://raw.githubusercontent.com/alianca-ciel/Alian-a-Ciel/main/elpis.mp3" type="audio/mpeg">


<script>
const musica = document.getElementById("musica");
const btnPlay = document.getElementById("btnPlay");
const btnPrev = document.getElementById("btnPrev");
const btnNext = document.getElementById("btnNext");
const trovao = document.getElementById("trovao");

let tocando = false;

// Função para iniciar música
function iniciarMusica() {
  if (!tocando) {
    musica.play().then(() => {
      tocando = true;
      btnPlay.innerHTML = "&#9612;&#9612;";
      btnPlay.classList.add("ativo");
    }).catch(() => {});
  }
}

document.addEventListener("click", iniciarMusica, { once: true });

// Controle Play/Pause
btnPlay.addEventListener("click", () => {
  if (tocando) {
    musica.pause();
    btnPlay.innerHTML = "&#9654;";
    btnPlay.classList.remove("ativo");
  } else {
    musica.play();
    btnPlay.innerHTML = "&#9612;&#9612;";
    btnPlay.classList.add("ativo");
  }
  tocando = !tocando;
});

// Botão Anterior - Volta para o começo
btnPrev.addEventListener("click", () => {
  musica.currentTime = 0;
});

// Botão Próxima - Avança um pouco
btnNext.addEventListener("click", () => {
  musica.currentTime += 10; // Avança 10 segundos
});

// Efeito Chuva
const chuvaEl = document.getElementById('chuva');
const quantidadeGotas = 50;

for (let i = 0; i < quantidadeGotas; i++) {
  criarGota();
}

function criarGota() {
  const gota = document.createElement('div');
  gota.classList.add('gota');
  
  const left = Math.random() * 100;
  const duracao = 2.5 + Math.random() * 3;
  const atraso = Math.random() * 5;
  const tamanho = 1 + Math.random() * 1;

  gota.style.left = left + 'vw';
  gota.style.animationDuration = duracao + 's';
  gota.style.animationDelay = atraso + 's';
  gota.style.width = tamanho + 'px';

  chuvaEl.appendChild(gota);
}

// Efeito Trovão Realista
function fazerTrovao() {
  trovao.classList.add('ativo');
  setTimeout(() => {
    trovao.classList.remove('ativo');
    if(Math.random() > 0.5) {
      setTimeout(() => {
        trovao.classList.add('ativo');
        setTimeout(() => trovao.classList.remove('ativo'), 100);
      }, 150);
    }
  }, 180);
  
  const proximo = 7000 + Math.random() * 7000;
  setTimeout(fazerTrovao, proximo);
}

setTimeout(fazerTrovao, 4000);
</script>

</body>
</html>
